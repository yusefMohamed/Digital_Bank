<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MDB - Multiservice Digital Bank</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #38bdf8;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .hero span {
            color: #38bdf8;
        }

        .hero p {
            margin-bottom: 30px;
            color: #94a3b8;
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-primary {
            background-color: #38bdf8;
            color: black;
        }

        .btn-primary:hover {
            background-color: #0ea5e9;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
        }

        .btn-secondary:hover {
            background-color: #38bdf8;
            color: black;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #64748b;
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">MDB</div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1>Welcome to <span>MDB</span></h1>
        <p>Multiservice Digital Bank Management System</p>

        <div class="buttons">
            <button class="btn btn-primary" onclick="location.href='/register-bank'">
                Register Bank
            </button>

            <button class="btn btn-secondary" onclick="location.href='/all-banks'">
                View All Banks
            </button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Multiservice Digital Bank
    </div>

</body>
</html>
