<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Bank - MDB</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #38bdf8;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #cbd5e1;
            font-size: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }

        input {
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            outline: none;
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        input[readonly] {
            background: rgba(255,255,255,0.03);
            color: #94a3b8;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 28px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            border: none;
            border-radius: 10px;
            padding: 12px 22px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-submit {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .btn-submit:hover {
            background-color: #0ea5e9;
        }

        .btn-back {
            background-color: transparent;
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        .btn-back:hover {
            background-color: #38bdf8;
            color: #0f172a;
        }

        .message-box {
            margin-bottom: 20px;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
        }

        .success-message {
            background-color: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Update Bank</h1>
        <p>Edit bank information in MDB system</p>
    </div>

    <div th:if="${successMessage}" class="message-box success-message" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="message-box error-message" th:text="${errorMessage}"></div>

    <form th:action="@{'/update-bank/' + ${bank.bankSwiftCode}}" method="post" th:object="${bank}">

        <div class="form-grid">

            <div class="form-group">
                <label for="bankSwiftCode">Swift Code</label>
                <input type="text" id="bankSwiftCode" th:field="*{bankSwiftCode}" readonly>
            </div>

            <div class="form-group">
                <label for="bankName">Bank Name</label>
                <input type="text" id="bankName" th:field="*{bankName}" required>
            </div>

            <div class="form-group full-width">
                <label for="bankAddress">Address</label>
                <input type="text" id="bankAddress" th:field="*{bankAddress}" required>
            </div>

            <div class="form-group">
                <label for="bankCity">City</label>
                <input type="text" id="bankCity" th:field="*{bankCity}" required>
            </div>

            <div class="form-group">
                <label for="bankPhoneNumber">Phone Number</label>
                <input type="text" id="bankPhoneNumber" th:field="*{bankPhoneNumber}" required>
            </div>

            <div class="form-group">
                <label for="bankFaxNumber">Fax Number</label>
                <input type="text" id="bankFaxNumber" th:field="*{bankFaxNumber}">
            </div>

            <div class="form-group">
                <label for="bankBalance">Bank Balance</label>
                <input type="number" step="0.01" id="bankBalance" th:field="*{bankBalance}" required>
            </div>

        </div>

        <div class="actions">
            <a href="/all-banks" class="btn btn-back">Back</a>
            <button type="submit" class="btn btn-submit">Update Bank</button>
        </div>

    </form>
</div>

</body>
</html>
