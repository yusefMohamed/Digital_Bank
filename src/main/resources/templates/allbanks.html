<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Banks - MDB</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            padding: 40px 20px;
        }

        .container {
            width: 95%;
            max-width: 1300px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-section h1 {
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .title-section p {
            color: #cbd5e1;
            font-size: 15px;
        }

        .home-btn {
            text-decoration: none;
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .home-btn:hover {
            background-color: #0ea5e9;
        }

        .message-box {
            margin-bottom: 20px;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 14px;
        }

        .success-message {
            background-color: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .table-wrapper {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: rgba(56, 189, 248, 0.18);
        }

        thead th {
            padding: 18px 15px;
            text-align: left;
            font-size: 14px;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        tbody td {
            padding: 16px 15px;
            font-size: 14px;
            color: #e2e8f0;
        }

        .balance {
            font-weight: bold;
            color: #22c55e;
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-update {
            padding: 7px 14px;
            background-color: #22c55e;
            color: #0f172a;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-update:hover {
            background-color: #16a34a;
        }

        .btn-delete {
            padding: 7px 14px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }

        .empty-box {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            text-align: center;
            border-radius: 18px;
            color: #cbd5e1;
            font-size: 18px;
        }

        @media (max-width: 1000px) {
            .table-wrapper {
                overflow-x: auto;
            }

            table {
                min-width: 1100px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="title-section">
            <h1>All Partner Banks</h1>
            <p>List of all registered banks in MDB system except the main bank</p>
        </div>

        <a href="/" class="home-btn">Back to Home</a>
    </div>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="message-box success-message" th:text="${successMessage}"></div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="message-box error-message" th:text="${errorMessage}"></div>

    <div th:if="${banks != null and !banks.isEmpty()}" class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Swift Code</th>
                <th>Bank Name</th>
                <th>Address</th>
                <th>City</th>
                <th>Phone</th>
                <th>Fax</th>
                <th>Balance</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="bank : ${banks}">
                <td th:text="${bank.bankSwiftCode}">CIBEEGCX</td>
                <td th:text="${bank.bankName}">Bank Name</td>
                <td th:text="${bank.bankAddress}">Address</td>
                <td th:text="${bank.bankCity}">City</td>
                <td th:text="${bank.bankPhoneNumber}">Phone</td>
                <td th:text="${bank.bankFaxNumber}">Fax</td>
                <td class="balance" th:text="${bank.bankBalance}">10000.00</td>

                <td class="actions">
                    <a th:href="@{'/update-bank/' + ${bank.bankSwiftCode}}" class="btn-update">
                        Update
                    </a>

                    <form th:action="@{'/delete-bank/' + ${bank.bankSwiftCode}}" method="post">
                        <button type="submit"
                                class="btn-delete"
                                onclick="return confirm('Are you sure you want to delete this bank?')">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${banks == null or banks.isEmpty()}" class="empty-box">
        No banks available to display.
    </div>

</div>

</body>
</html>
